    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes shimmer { from{background-position:-200% 0} to{background-position:200% 0} }
    @keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

    .fade-up { animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both; }
    .fade-in { animation: fadeIn .3s ease both; }
    .slide-down { animation: slideDown .25s ease both; }

function showToast(msg, type = 'success') {
  const t  = document.getElementById('toast');

  const colors = {
    success: 'background:linear-gradient(135deg,#059669,#047857);color:#fff',

}

function timeAgo(ts) {
  if (!ts) return '';
  const d    = ts.toDate ? ts.toDate() : new Date(ts);
  const secs = Math.floor((Date.now() - d) / 1000);
  if (secs < 60)    return currentLang === 'ku' ? 'ئێستا' : 'just now';
  if (secs < 3600)  return currentLang === 'ku' ? `${Math.floor(secs/60)}خ` : `${Math.floor(secs/60)}m ago`;
  if (secs < 86400) return currentLang === 'ku' ? `${Math.floor(secs/3600)}س` : `${Math.floor(secs/3600)}h ago`;
  return currentLang === 'ku' ? `${Math.floor(secs/86400)}ر` : `${Math.floor(secs/86400)}d ago`;
}

/* ── VIDEO URL → EMBED ── */
function getEmbedInfo(url) {
  if (!url || !url.trim()) return null;
  const u = url.trim();
  // YouTube (watch, shorts, youtu.be, embed)
  const ytID = u.match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/|v\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (ytID) return { type: 'iframe', src: `https://www.youtube.com/embed/${ytID[1]}?autoplay=1&rel=0&modestbranding=1` };
  // Vimeo
  const vm = u.match(/(?:vimeo\.com\/)(\d+)/);
  if (vm) return { type: 'iframe', src: `https://player.vimeo.com/video/${vm[1]}?autoplay=1` };
  // Dailymotion
  const dm = u.match(/dailymotion\.com\/video\/([a-zA-Z0-9]+)/);
  if (dm) return { type: 'iframe', src: `https://www.dailymotion.com/embed/video/${dm[1]}?autoplay=1` };
  // Direct video file
  if (/\.(mp4|webm|ogg|m3u8)(\?|$)/i.test(u)) return { type: 'video', src: u };
  // Generic iframe fallback
  return { type: 'iframe', src: u };
}

        await setDoc(ref, currentProfile);
      }
    } catch(e) { console.warn('Profile error:', e); }
  } else { currentProfile = null; }
  clearListeners();
  render();
});

// ============================================================
// ROUTER
// ============================================================
let routeState = { page: 'home', params: {} };

function navigate(page, params = {}) {
  clearListeners();
  routeState = { page, params };
  history.pushState({ page, params }, '', '#' + buildHash(page, params));
  render();
}
function buildHash(page, params) {
  if (page === 'home')    return '/';
  if (page === 'film')    return `/film/${params.id}`;
  if (page === 'watch')   return `/watch/${params.id}${params.ep !== undefined ? '?ep='+params.ep : ''}`;
  if (page === 'profile') return '/profile';
  if (page === 'manage')  return '/manage';
  if (page === 'admin')   return '/admin';
  return '/';
}
function parseHash() {
  const raw   = location.hash.replace('#','') || '/';
  const [path,qs] = raw.split('?');
  const parts = path.split('/').filter(Boolean);
  const params = Object.fromEntries((qs||'').split('&').filter(Boolean).map(p => p.split('=')));
  if (!parts[0] || parts[0]==='') return {page:'home',params};
  if (parts[0]==='film')    return {page:'film',  params:{id:parts[1],...params}};
  if (parts[0]==='watch')   return {page:'watch', params:{id:parts[1],...params}};
  if (parts[0]==='profile') return {page:'profile',params};
  if (parts[0]==='manage')  return {page:'manage', params};
  if (parts[0]==='admin')   return {page:'admin',  params};
  return {page:'home',params};
}
window.addEventListener('popstate', (e) => { clearListeners(); routeState = e.state || parseHash(); render(); });
window.addEventListener('hashchange', () => { clearListeners(); routeState = parseHash(); render(); });

// RENDER ENGINE
// ============================================================
function render() {
  const app = document.getElementById('app');
  const { page, params } = routeState;
  const pages = { home: renderHome, film: renderFilmDetail, watch: renderWatch, profile: renderProfile, manage: renderManage, admin: renderAdmin };
  const pageHTML = (pages[page] || renderHome)(params);
  app.innerHTML = renderNav() + `<main class="pt-16 min-h-screen">${pageHTML}</main>` + renderFooter();
  attachNavEvents();
  const attachFns = { home: attachHomeEvents, film: attachFilmDetailEvents, watch: attachWatchEvents, profile: attachProfileEvents, manage: attachManageEvents, admin: attachAdminEvents };
  attachFns[page]?.(params);
  // Apply lang dir
  document.getElementById('html-root').dir  = currentLang === 'ku' ? 'rtl' : 'ltr';
  document.getElementById('html-root').lang = currentLang === 'ku' ? 'ckb' : 'en';
}

            <span class="px-2 py-1 rounded text-xs font-bold uppercase tracking-widest" style="background:var(--red);color:#fff">${esc(h.type)}</span>
            <div class="flex items-center gap-1" style="color:var(--gold)">${svg('star','w-3.5 h-3.5')}<span class="text-sm font-bold">${h.rating||''}</span></div>
            <span style="color:rgba(255,255,255,.4);font-size:14px">${h.year||''}</span>
          </div>
          <h1 class="font-display uppercase leading-none" style="font-size:clamp(2.5rem,6vw,5rem);letter-spacing:.05em">${esc(h.title)}</h1>
          <p class="line-clamp-3" style="color:rgba(255,255,255,.6);font-size:16px;line-height:1.7;max-width:500px">${esc(h.description)}</p>
          <div class="flex items-center gap-3 pt-2 flex-wrap">
            <button onclick="navigate('watch',{id:'${h.id}'})" class="btn flex items-center gap-2 px-7 py-3 rounded-full font-bold" style="background:#fff;color:#000">
              ${svg('play','w-5 h-5')} ${t('watchNow')}
            </button>
            <button onclick="navigate('film',{id:'${h.id}'})" class="btn flex items-center gap-2 px-7 py-3 rounded-full font-bold" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(10px)">
              ${svg('info','w-5 h-5')} ${t('moreInfo')}
            </button>
          </div>
        </div>
      </div>`;

    const rows = [
      [t('recentlyAdded'), films.slice(0,10)],
      [t('allMovies'),  films.filter(f=>f.type==='movie')],
      [t('allSeries'),  films.filter(f=>f.type==='series')],
    ].filter(([,arr])=>arr.length);

    filmRows.innerHTML = rows.map(([title, arr], ri) =>
      `<section class="space-y-5 fade-up" style="animation-delay:${ri*0.08}s">
        <h2 class="font-display text-xl tracking-widest uppercase" style="letter-spacing:.1em">${title}</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
          ${arr.map(film => renderFilmCard(film)).join('')}
        </div>
        ${ri === 1 ? `<div class="py-2">${adBanner('leaderboard')}</div>` : ''}
      </section>`
    ).join('');
  }, (e) => {
    const hero = document.getElementById('hero-section');
    if (hero) hero.innerHTML = `<div class="flex items-center justify-center h-full"><p style="color:#f87171">${e.message}</p></div>`;
  });
  activeListeners.push(unsub);
}

function renderFilmDetail() {
  return `<div id="film-detail-root" class="fade-up"><div class="flex items-center justify-center" style="min-height:60vh">${svg('load','w-12 h-12 text-rose-600')}</div></div>`;
}

function attachFilmDetailEvents(params) {
  const id = params.id;
  if (!id) { navigate('home'); return; }
  let film=null, comments=[], userRating=null, isFav=false, isWatched=false, isLater=false;

  function rerender() {
    if (!film) return;
    const root = document.getElementById('film-detail-root');
    if (root) root.innerHTML = renderFilmDetailContent(film, comments, userRating, isFav, isWatched, isLater);
  }

  activeListeners.push(onSnapshot(doc(db,'films',id), (s) => {
    if (!s.exists()) { navigate('home'); return; }
    film = {id:s.id,...s.data()}; filmCache.set(id, film); rerender();
  }));
  activeListeners.push(onSnapshot(query(collection(db,'films',id,'comments')), (s) => {
    comments = s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    rerender();
  }, ()=>{}));

  if (currentUser) {
    const uid = currentUser.uid;
    activeListeners.push(onSnapshot(doc(db,'films',id,'ratings',uid), (s) => { userRating = s.exists()?s.data().rating:null; rerender(); }, ()=>{}));
    activeListeners.push(onSnapshot(doc(db,'users',uid,'favorites',id), (s) => { isFav=s.exists(); rerender(); }, ()=>{}));
    activeListeners.push(onSnapshot(doc(db,'users',uid,'watched',id), (s) => { isWatched=s.exists(); rerender(); }, ()=>{}));
    activeListeners.push(onSnapshot(doc(db,'users',uid,'watchLater',id), (s) => { isLater=s.exists(); rerender(); }, ()=>{}));
  }
}

function renderComment(c, filmId) {
  const canDel = currentUser && (currentUser.uid===c.userId || isAdmin());
  return `<div class="flex gap-4 group">
    <div class="w-9 h-9 rounded-full overflow-hidden flex-shrink-0" style="border:1px solid var(--border)">
      ${c.userPhoto?`<img src="${esc(c.userPhoto)}" class="w-full h-full object-cover" />`:`<div class="w-full h-full flex items-center justify-center" style="background:#1a1a1f">${svg('user','w-3.5 h-3.5 text-gray-500')}</div>`}
    </div>
    <div class="flex-1">
      <div class="flex items-center justify-between mb-1">
        <div class="flex items-center gap-2">
          <span class="font-semibold text-sm">${esc(c.userName)}</span>
          <span style="color:rgba(255,255,255,.25);font-size:12px">${timeAgo(c.createdAt)}</span>
        </div>
        ${canDel?`<button onclick="deleteComment('${filmId}','${c.id}')" class="btn p-1.5 rounded-lg opacity-0 group-hover:opacity-100" style="color:rgba(255,255,255,.3);transition:opacity .15s">${svg('trash','w-4 h-4')}</button>`:''}
      </div>
      <p style="color:rgba(255,255,255,.65);font-size:14px;line-height:1.6">${esc(c.text)}</p>
    </div>
  </div>`;
}

window.postComment = async (filmId) => {
  const inp = document.getElementById('comment-input');
  if (!inp||!inp.value.trim()||!currentUser) return;
  const text = inp.value.trim(); inp.value='';
  try {
    await addDoc(collection(db,'films',filmId,'comments'),{
      filmId, userId:currentUser.uid, userName:currentUser.displayName||'Anonymous',
      userPhoto:currentUser.photoURL||null, text, createdAt:serverTimestamp()
    });
  } catch(e) { showToast(t('failed'),'error'); }
};
window.deleteComment = async (filmId,cId) => {
  try { await deleteDoc(doc(db,'films',filmId,'comments',cId)); }
  catch(e) { showToast(t('failed'),'error'); }
};
window.rateFilm = async (filmId, rating) => {
  if (!currentUser) { signInWithGoogle(); return; }
  try {
    await setDoc(doc(db,'films',filmId,'ratings',currentUser.uid),{
      filmId, userId:currentUser.uid, rating, createdAt:serverTimestamp()
    });
    showToast(`${t('yourRating')}: ${rating}/10`,'success');
  } catch(e) { showToast(t('failed'),'error'); }
};
window.toggleList = async (listType, filmId) => {
  if (!currentUser) { signInWithGoogle(); return; }
  const ref = doc(db,'users',currentUser.uid,listType,filmId);
  try {
    const s = await getDoc(ref);
    if (s.exists()) { await deleteDoc(ref); showToast(t('deleted'),'info'); }
    else            { await setDoc(ref,{filmId,createdAt:serverTimestamp()}); showToast(t('added'),'success'); }
  } catch(e) { showToast(t('failed'),'error'); }
};

function renderWatch() {
  return `<div id="watch-page-root" class="fade-in"><div class="flex items-center justify-center" style="min-height:100vh">${svg('load','w-12 h-12 text-rose-600')}</div></div>`;
}

function attachWatchEvents(params) {
  const id    = params.id;
  const epIdx = parseInt(params.ep || '0');
  if (!id) { navigate('home'); return; }

  const unsub = onSnapshot(doc(db,'films',id), (snap) => {
    if (!snap.exists()) { navigate('home'); return; }
    const film = {id:snap.id,...snap.data()};
    filmCache.set(id, film);
    const root = document.getElementById('watch-page-root');
    if (root) root.innerHTML = renderWatchContent(film, epIdx);
  });
  activeListeners.push(unsub);
}

function renderWatchContent(film, epIdx) {
  const rawUrl    = film.type==='series'&&film.episodes ? film.episodes[epIdx]?.videoUrl : film.videoUrl;
  const title     = film.type==='series'&&film.episodes ? `${film.title} — ${film.episodes[epIdx]?.title||''}` : film.title;
  const embedInfo = getEmbedInfo(rawUrl);

  let playerHTML = '';
  if (!embedInfo) {
    playerHTML = `<div class="flex flex-col items-center justify-center h-full space-y-4 text-center p-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center" style="background:rgba(225,29,72,.1);color:var(--red)">${svg('x','w-8 h-8')}</div>
      <h2 class="font-display text-2xl uppercase tracking-widest">${t('noVideo')}</h2>
      <button onclick="navigate('film',{id:'${film.id}'})" class="btn font-bold" style="color:var(--red)">${t('backToDetails')}</button>
    </div>`;
  } else if (embedInfo.type === 'iframe') {
    playerHTML = `<iframe
      src="${esc(embedInfo.src)}"
      style="width:100%;height:100%;min-height:56vw;max-height:80vh;display:block"
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
      allowfullscreen
      frameborder="0"
    ></iframe>`;
  } else {
    playerHTML = `<video
      src="${esc(embedInfo.src)}"
      controls autoplay playsinline
      style="width:100%;max-height:80vh;display:block;background:#000"
    ></video>`;
  }

  const episodeList = film.type==='series'&&film.episodes?.length ? `
  <div style="background:rgba(0,0,0,.6);border-top:1px solid var(--border);padding:20px">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-display text-sm tracking-widest uppercase" style="letter-spacing:.1em">${t('episodes')} — ${epIdx+1} ${t('of')} ${film.episodes.length}</h3>
      </div>
      <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
        ${film.episodes.map((ep,idx)=>`
        <button onclick="navigate('watch',{id:'${film.id}',ep:${idx}})" class="ep-card flex-shrink-0 p-4 rounded-2xl text-left btn ${epIdx===idx?'current':''}" style="min-width:180px;border:1px solid var(--border)">
          <div class="flex items-center justify-between mb-1.5">
            <span style="font-size:11px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em">${t('episode')} ${idx+1}</span>
            ${epIdx===idx?`<div class="w-2 h-2 rounded-full pulse-anim" style="background:var(--red)"></div>`:''}
          </div>
          <h4 class="font-semibold text-sm line-clamp-1">${esc(ep.title)}</h4>
        </button>`).join('')}
      </div>
    </div>
  </div>` : '';

  return `
  <!-- Watch Header -->
  <div class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 py-3" style="background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent)">
    <div class="flex items-center gap-3">
      <button onclick="navigate('film',{id:'${film.id}'})" class="btn p-2 rounded-full" style="background:rgba(255,255,255,.1);color:#fff">${svg('back','w-5 h-5')}</button>
      <div>
        <h1 class="font-semibold text-sm line-clamp-1">${esc(title)}</h1>
        <div class="flex items-center gap-2" style="font-size:11px;color:rgba(255,255,255,.4)">
          <span class="uppercase font-bold tracking-widest" style="color:var(--red)">${esc(film.type)}</span>
          ${film.type==='series'?`<span>${t('episodeOf')} ${epIdx+1}</span>`:''}
        </div>
      </div>
    </div>
    <button onclick="navigator.clipboard?.writeText(location.href);showToast(t('linkCopied'),'info')" class="btn p-2 rounded-full" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)">
      ${svg('share','w-4 h-4')}
    </button>
  </div>

  <!-- Player -->
  <div style="background:#000;padding-top:56px;min-height:50vh;display:flex;align-items:center;justify-content:center">
    ${playerHTML}
  </div>

  <!-- Episode List -->
  ${episodeList}

  <!-- Mobile ad below player -->
  <div class="lg:hidden p-4">${adBanner('mobile')}</div>
  `;
}

function attachProfileEvents() {
  if (!currentUser) return;
  let favFilms=[], watchedFilms=[], laterFilms=[];
  let activeTab = 'favorites';

  function rerender() {
    const root = document.getElementById('profile-root');
    if (!root) return;
    const list = activeTab==='favorites'?favFilms:activeTab==='watched'?watchedFilms:laterFilms;
    root.innerHTML = renderProfileContent(list, activeTab);
    root.querySelectorAll('.ptab').forEach(b=>b.addEventListener('click',()=>{activeTab=b.dataset.t;rerender();}));
  }

  async function fetchList(col, setter) {
    try {
      const snap = await getDocs(collection(db,'users',currentUser.uid,col));
      const ids  = snap.docs.map(d=>d.id);
      const films = await Promise.all(ids.map(async id=>{
        if (filmCache.has(id)) return filmCache.get(id);
        try { const s=await getDoc(doc(db,'films',id)); return s.exists()?{id:s.id,...s.data()}:null; } catch{return null;}
      }));
      setter(films.filter(Boolean));
      rerender();
    } catch(e) { rerender(); }
  }

  fetchList('favorites',f=>{favFilms=f;});
  fetchList('watched',f=>{watchedFilms=f;});
  fetchList('watchLater',f=>{laterFilms=f;});
  rerender();
}

window.deleteFilm = async (id) => {
  if (!isAdmin()) { showToast(t('accessDenied'),'error'); return; }
  // Custom confirm dialog
  const confirmed = await showConfirmDialog(t('deleteConfirm'));
  if (!confirmed) return;
  try {
    await deleteDoc(doc(db,'films',id));
    filmCache.delete(id);
    showToast(t('deleted'),'success');
  } catch(e) {
    showToast(t('failed')+': '+e.message,'error');
  }
};

// Custom confirm dialog (replaces browser confirm which can be blocked)
function showConfirmDialog(msg) {
  return new Promise(resolve => {
    const mr = document.getElementById('modal-root');
    mr.innerHTML = `
    <div class="modal-bg" id="confirm-overlay">
      <div class="rounded-2xl p-8 text-center space-y-5 fade-in" style="background:#0f0f11;border:1px solid var(--border2);max-width:380px;width:100%">
        <div class="w-14 h-14 mx-auto rounded-2xl flex items-center justify-center" style="background:rgba(225,29,72,.1);color:var(--red)">${svg('trash','w-7 h-7')}</div>
        <p class="font-semibold" style="color:rgba(255,255,255,.85)">${esc(msg)}</p>
        <div class="flex gap-3 justify-center">
          <button id="conf-no"  class="btn px-6 py-2.5 rounded-full font-bold text-sm" style="background:rgba(255,255,255,.07);color:rgba(255,255,255,.6)">${t('cancel')}</button>
          <button id="conf-yes" class="btn px-6 py-2.5 rounded-full font-bold text-sm text-white" style="background:var(--red)">${t('deleted')}</button>
        </div>
      </div>
    </div>`;
    document.getElementById('conf-yes').onclick = () => { mr.innerHTML=''; resolve(true); };
    document.getElementById('conf-no').onclick  = () => { mr.innerHTML=''; resolve(false); };
  });
}

};

function renderEpisodeField(ep, idx) {
  return `<div id="epf-${idx}" class="grid gap-3 p-4 rounded-xl" style="grid-template-columns:1fr 2fr auto;background:rgba(255,255,255,.03);border:1px solid var(--border)">
    <div class="space-y-1">
      <label class="text-xs font-bold uppercase tracking-widest" style="color:rgba(255,255,255,.3)">${t('epTitle')}</label>
      <input class="ep-title" type="text" value="${esc(ep.title||'')}" placeholder="${t('episode')} ${idx+1}" />
    </div>
    <div class="space-y-1">
      <label class="text-xs font-bold uppercase tracking-widest" style="color:rgba(255,255,255,.3)">${t('epUrl')}</label>
      <input class="ep-url" type="url" value="${esc(ep.videoUrl||'')}" placeholder="https://..." />
    </div>
    <div class="flex items-end pb-1">
      <button onclick="this.closest('[id^=epf-]').remove()" class="btn p-2 rounded-lg" style="color:rgba(255,60,60,.6)">${svg('trash','w-4 h-4')}</button>
    </div>
  </div>`;
}

window.addEpisodeField = () => {
  const list = document.getElementById('episodes-list');
  if (!list) return;
  const idx = list.children.length;
  const div = document.createElement('div');
  div.innerHTML = renderEpisodeField({title:'',videoUrl:''},idx);
  list.appendChild(div.firstChild);
};

window.saveFilm = async (editId) => {
  const gv = id => document.getElementById(id)?.value?.trim()||'';
  const title       = gv('f-title');
  const description = gv('f-desc');
  const thumbnailUrl= gv('f-thumb');
  const videoUrl    = gv('f-video');
  const type        = gv('f-type');
  const year        = parseInt(gv('f-year'))||new Date().getFullYear();
  const rating      = parseFloat(gv('f-rating'))||0;
  const genres      = gv('f-genres').split(',').map(g=>g.trim()).filter(Boolean);

  if (!title||!description||!thumbnailUrl||!videoUrl) {
    showToast(t('fillAll'),'error'); return;
  }

  const episodes = [];
  document.querySelectorAll('#episodes-list>[id^=epf-]').forEach((el,idx)=>{
    const ttl = el.querySelector('.ep-title')?.value?.trim();
    const url = el.querySelector('.ep-url')?.value?.trim();
    if (ttl) episodes.push({id:String(idx+1),title:ttl,videoUrl:url||''});
  });

  const data = { title, description, thumbnailUrl, videoUrl, type, year, rating, genres, episodes };

  try {
    if (editId) {
      await updateDoc(doc(db,'films',editId), {...data, updatedAt:serverTimestamp()});
      filmCache.set(editId, {...filmCache.get(editId)||{}, id:editId, ...data});
      showToast(t('updated'),'success');
    } else {
      const ref = await addDoc(collection(db,'films'), {...data, addedBy:currentUser.uid, createdAt:serverTimestamp()});
      filmCache.set(ref.id, {id:ref.id, ...data});
      showToast(t('added'),'success');
    }
    closeModal();
  } catch(e) { showToast(t('failed')+': '+e.message,'error'); }
};

// ============================================================
// EXPOSE GLOBALS
// ============================================================
window.navigate  = navigate;
window.showToast = showToast;
window.currentLang = currentLang; // make accessible for nav toggle

// ============================================================
// INIT
// ============================================================
routeState = parseHash();
render();
</script>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CineVerse — Watch Movies & Series</title>
<meta name="description" content="Watch movies and series online in high quality. Multi-language support.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Noto+Sans+Arabic:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e11d48; --red2: #9f1239; --gold: #f59e0b; --green: #10b981; --blue: #3b82f6; --purple: #8b5cf6;
  --dark: #07090f; --dark2: #0d1017; --card: #111620; --card2: #161c28;
  --glass: rgba(255,255,255,.05); --border: rgba(255,255,255,.08);
  --text: #f1f5f9; --text-invert: #000; --muted: rgba(255,255,255,.45); --muted2: rgba(255,255,255,.25);
  --font: 'DM Sans', 'Noto Sans Arabic', sans-serif;
  --display: 'Bebas Neue', 'Noto Sans Arabic', cursive;
  --nav: 64px; --radius: 14px; --bg: var(--dark);
}

body.light-mode {
  --bg: #f8fafc; --dark: #f8fafc; --dark2: #e2e8f0; --card: #ffffff; --card2: #f1f5f9;
  --glass: rgba(0,0,0,.04); --border: rgba(0,0,0,.1);
  --text: #0f172a; --text-invert: #fff; --muted: rgba(0,0,0,.55); --muted2: rgba(0,0,0,.35);
}

*,*::before,*::after {box-sizing:border-box;margin:0;padding:0}
html {scroll-behavior:smooth}
body {font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s, color 0.3s;}
body.rtl {direction:rtl;font-family:'Noto Sans Arabic','DM Sans',sans-serif}
body.rtl .bi-arrow-left, body.rtl .bi-box-arrow-right { transform: scaleX(-1); display: inline-block; }
a {text-decoration:none;color:inherit}
img {display:block;max-width:100%}
button {cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}

::-webkit-scrollbar {width:6px;height:6px}
::-webkit-scrollbar-track {background:transparent}
::-webkit-scrollbar-thumb {background:var(--border);border-radius:6px}
::-webkit-scrollbar-thumb:hover {background:var(--red)}

.skeleton {background:linear-gradient(90deg,var(--glass) 25%,var(--border) 50%,var(--glass) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius)}
@keyframes shimmer {0%{background-position:200% 0}100%{background-position:-200% 0}}

#nav {position:fixed;top:0;left:0;right:0;z-index:900;height:var(--nav);background:rgba(var(--bg),.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border); transition: background 0.3s;}
.nav-inner {display:flex;align-items:center;gap:1rem;height:100%;padding:0 1.5rem; max-width: 1280px; margin: 0 auto;}
.brand {display:flex;align-items:center;gap:.65rem;flex-shrink:0}
.brand-icon {width:36px;height:36px;border-radius:10px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;box-shadow:0 0 16px rgba(225,29,72,.4);transition:transform .2s}
.brand-icon:hover {transform:scale(1.1)}
.brand-name {font-family:var(--display);font-size:1.35rem;letter-spacing:.18em;text-transform:uppercase}
.nav-links {display:flex;align-items:center;gap:.25rem;margin-left:.5rem}
body.rtl .nav-links {margin-left:0; margin-right:.5rem;}
.nav-link {font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:.35rem .75rem;border-radius:8px;transition:all .2s}
.nav-link:hover, .nav-link.active {color:var(--text);background:var(--glass)}
.nav-link.active {color:var(--red)!important}
.nav-spacer {flex:1}
.nav-search {position:relative;display:flex;align-items:center}
.nav-search input {background:var(--glass);border:1px solid var(--border);border-radius:50px;color:var(--text);padding:.38rem 1rem .38rem 2.2rem;font-size:.8rem;width:200px;transition:all .3s}
.nav-search input:focus {outline:none;width:260px;border-color:rgba(225,29,72,.4);background:var(--card)}
.nav-search .icon {position:absolute;left:.75rem;color:var(--muted);font-size:.85rem;pointer-events:none}
body.rtl .nav-search input {padding:.38rem 2.2rem .38rem 1rem}
body.rtl .nav-search .icon {left:auto;right:.75rem}
.nav-btn {font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:.35rem .9rem;border-radius:50px;transition:all .2s;white-space:nowrap; border:1px solid var(--border); background:var(--glass)}
.nav-btn:hover {background:var(--border)}
.nav-btn.add {color:var(--red);background:rgba(225,29,72,.1);border-color:rgba(225,29,72,.25)}
.nav-btn.add:hover {background:var(--red);color:#fff}
.user-avatar {width:36px;height:36px;border-radius:50%;border:2px solid var(--border);overflow:hidden;transition:border-color .2s;cursor:pointer;flex-shrink:0}
.user-avatar:hover {border-color:var(--red)}
.user-avatar img {width:100%;height:100%;object-fit:cover}

.mob-nav {position:fixed;inset:0;z-index:1100;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:2rem;}
.mob-nav.open {display:flex}
.mob-link {font-family:var(--display);font-size:2.2rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color .2s}
.mob-link:hover {color:var(--red)}
.menu-btn {display:none;width:36px;height:36px;border-radius:8px;align-items:center;justify-content:center;background:var(--glass);border:1px solid var(--border)}
@media(max-width:768px){.menu-btn{display:flex}.nav-links,.nav-search{display:none!important}}

.page {display:none; padding-top:var(--nav); min-height:80vh; animation: fadeUp .3s ease forwards;}
.page.active {display:block}

.hero {position:relative;height:75vh;min-height:520px;display:flex;align-items:flex-end;overflow:hidden}
.hero-bg {position:absolute;inset:0}
.hero-bg img {width:100%;height:100%;object-fit:cover;opacity:.35;transform:scale(1.04);transition:opacity .8s,transform 8s linear}
.hero-bg img.loaded {transform:scale(1)}
.hero-bg::after {content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--bg) 0%,rgba(7,9,15,.4) 50%,transparent 100%),linear-gradient(0deg,var(--bg) 0%,transparent 50%)}
body.rtl .hero-bg::after {background:linear-gradient(270deg,var(--bg) 0%,rgba(7,9,15,.4) 50%,transparent 100%),linear-gradient(0deg,var(--bg) 0%,transparent 50%)}
.hero-content {position:relative;z-index:2;padding:0 1.5rem 3.5rem;max-width:1280px;margin:0 auto;width:100%}
.hero-badge {display:inline-flex;align-items:center;gap:.4rem;font-size:.65rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--red);padding:.28rem .85rem;border-radius:50px;background:rgba(225,29,72,.12);border:1px solid rgba(225,29,72,.25);margin-bottom:.85rem}
.hero-title {font-family:var(--display);font-size:clamp(2.8rem,8vw,6rem);line-height:.95;letter-spacing:.02em;text-transform:uppercase;margin-bottom:.75rem}
.hero-meta {display:flex;flex-wrap:wrap;align-items:center;gap:.6rem;margin-bottom:.85rem}
.hero-meta span {font-size:.78rem;font-weight:600;color:var(--muted)}
.hero-meta .dot {width:3px;height:3px;border-radius:50%;background:var(--muted)}
.star {color:var(--gold);font-weight:800;font-size:.82rem}
.hero-desc {color:var(--muted);max-width:480px;line-height:1.75;font-size:.9rem;margin-bottom:1.5rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-btns {display:flex;flex-wrap:wrap;gap:.75rem}

.btn-primary-cv {display:inline-flex;align-items:center;gap:.5rem;padding:.72rem 1.8rem;border-radius:50px;background:var(--red);color:#fff;font-weight:700;font-size:.88rem;transition:all .22s;box-shadow:0 6px 20px rgba(225,29,72,.3)}
.btn-primary-cv:hover {transform:scale(1.04);box-shadow:0 10px 28px rgba(225,29,72,.45);color:#fff}
.btn-secondary-cv {display:inline-flex;align-items:center;gap:.5rem;padding:.72rem 1.8rem;border-radius:50px;background:var(--glass);color:var(--text);font-weight:700;font-size:.88rem;border:1px solid var(--border);transition:all .22s}
.btn-secondary-cv:hover {background:var(--border)}
.btn-icon {width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .2s;border:1px solid var(--border);background:var(--glass)}
.btn-icon:hover {background:var(--border)}
.btn-icon.red {background:rgba(225,29,72,.12);color:var(--red);border-color:rgba(225,29,72,.2)}
.btn-icon.red:hover {background:var(--red);color:#fff}

.section {padding:2.5rem 0}
.section-hdr {display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.section-title {font-family:var(--display);font-size:1.6rem;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:.65rem}
.section-bar {width:4px;height:24px;border-radius:4px}
.section-bar.red {background:var(--red);box-shadow:0 0 12px var(--red)}
.section-bar.gold {background:var(--gold);box-shadow:0 0 12px var(--gold)}
.section-bar.blue {background:var(--blue);box-shadow:0 0 12px var(--blue)}

.film-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem}
@media(max-width:480px){.film-grid{grid-template-columns:repeat(2,1fr);gap:.65rem}}

.film-card {position:relative;border-radius:var(--radius);overflow:hidden;aspect-ratio:2/3;cursor:pointer;background:var(--card);border:1px solid var(--border);transition:transform .3s,box-shadow .3s}
.film-card:hover {transform:translateY(-5px);border-color:var(--red);box-shadow:0 15px 30px rgba(0,0,0,.3)}
.film-card img {width:100%;height:100%;object-fit:cover;transition:transform .5s}
.film-card:hover img {transform:scale(1.05)}
.film-card .overlay {position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.1) 60%,transparent 100%);opacity:.8;transition:opacity .3s}
.film-card:hover .overlay {opacity:1}
.film-card .body {position:absolute;bottom:0;left:0;right:0;padding:.85rem .75rem;transform:translateY(8px);transition:transform .3s; color:#fff;}
.film-card:hover .body {transform:translateY(0)}
.fc-type {font-size:.55rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:var(--red);color:#fff;display:inline-block;margin-bottom:.3rem}
.fc-type.series {background:var(--purple)}
.fc-type.dub {background:var(--blue)}
.fc-title {font-family:var(--display);font-size:1rem;line-height:1.1;text-transform:uppercase;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.2rem}
.fc-meta {font-size:.65rem;color:rgba(255,255,255,.6);margin-bottom:.5rem}
.fc-actions {display:flex;gap:.35rem;opacity:0;transform:translateY(5px);transition:all .22s}
.film-card:hover .fc-actions {opacity:1;transform:translateY(0)}
.fc-watch {flex:1;padding:.4rem;border-radius:8px;background:#fff;color:#000;font-size:.65rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:.3rem;transition:all .2s}
.fc-watch:hover {background:var(--red);color:#fff}
.fc-btn {width:28px;height:28px;border-radius:7px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.72rem;transition:all .2s;flex-shrink:0}
.fc-btn:hover {background:rgba(255,255,255,.3)}

.filter-bar {display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;align-items:center}
.filter-pill {font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .9rem;border-radius:50px;border:1px solid var(--border);color:var(--text);background:var(--glass);transition:all .2s}
.filter-pill:hover {border-color:var(--red);color:var(--red)}
.filter-pill.active {background:var(--red);border-color:var(--red);color:#fff}

.cv-input,.cv-textarea,.cv-select {width:100%;background:var(--glass);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:.65rem 1rem;font-family:var(--font);font-size:.88rem;transition:all .2s}
.cv-input:focus,.cv-textarea:focus,.cv-select:focus {outline:none;border-color:var(--red);background:var(--card);box-shadow:0 0 0 3px rgba(225,29,72,.1)}
.cv-label {font-size:.68rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.4rem}

.modal-backdrop-cv {position:fixed;inset:0;z-index:1200;background:rgba(0,0,0,.85);backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}
.modal-backdrop-cv.open {display:flex}
.modal-box {width:100%;max-width:800px;border-radius:22px;padding:2rem;max-height:92vh;overflow-y:auto;margin:auto; background:var(--card); border:1px solid var(--border);}
@media(max-width:576px){.modal-box{padding:1.25rem;border-radius:16px}}

.player-wrap {border-radius:16px;overflow:hidden;background:#000;aspect-ratio:16/9;border:1px solid var(--border);box-shadow:0 32px 64px rgba(0,0,0,.4)}
.player-wrap iframe,.player-wrap video {width:100%;height:100%;display:block;border:none}

#toasts {position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none;align-items:center}
.toast-cv {padding:.65rem 1.4rem;border-radius:50px;font-weight:700;font-size:.82rem;display:flex;align-items:center;gap:.45rem;white-space:nowrap;pointer-events:auto;animation:toastIn .3s ease; color:#fff;}
.toast-cv.success {background:var(--green)}
.toast-cv.error {background:var(--red)}
@keyframes toastIn {from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp {from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="cfgBanner" style="display:none;background:var(--gold);color:#000;text-align:center;padding:.45rem;font-weight:bold;font-size:.8rem;">Firebase Config Required</div>
<div id="toasts"></div>

<div class="mob-nav" id="mobNav">
  <button class="menu-btn" onclick="toggleMobNav()" style="position:absolute;top:1rem;right:1rem;display:flex"><i class="bi bi-x-lg"></i></button>
  <a class="mob-link" onclick="navigate('home')">Home</a>
  <a class="mob-link" id="mobMyList" onclick="navigate('mylist')" style="display:none">My List</a>
  <a class="mob-link" id="mobManage" onclick="navigate('manage')" style="display:none">Manage</a>
  <a class="mob-link" id="mobAdmin" style="color:var(--gold)" onclick="navigate('admin')" style="display:none">Admin</a>
  <a class="mob-link" onclick="navigate('profile')">Profile</a>
</div>

<nav id="nav">
  <div class="nav-inner">
    <div class="brand" onclick="navigate('home')" style="cursor:pointer">
      <div class="brand-icon"><i class="bi bi-film"></i></div>
      <span class="brand-name d-none d-sm-block">CineVerse</span>
    </div>
    <div class="nav-links d-none d-md-flex">
      <button class="nav-link active" id="nl-home" onclick="navigate('home')">Home</button>
      <button class="nav-link" id="nl-mylist" onclick="navigate('mylist')" style="display:none">My List</button>
      <button class="nav-link" id="nl-manage" onclick="navigate('manage')" style="display:none">Manage</button>
      <button class="nav-link" id="nl-admin" style="display:none;color:var(--gold)!important" onclick="navigate('admin')">Admin</button>
    </div>
    <div class="nav-spacer"></div>
    <div class="nav-search d-none d-lg-flex">
      <i class="bi bi-search icon"></i>
      <input type="text" id="searchInput" placeholder="Search films..." oninput="onSearch(this.value)">
    </div>
    <button class="nav-btn" onclick="toggleTheme()" title="Toggle Theme"><i class="bi bi-moon-stars" id="themeIcon"></i></button>
    <button class="nav-btn lang" id="langBtn" onclick="toggleLang()">کوردی</button>
    <div id="userArea"></div>
    <button class="menu-btn" onclick="toggleMobNav()"><i class="bi bi-list"></i></button>
  </div>
</nav>

<main>
  <div id="loader" style="height:80vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem">
    <div class="spinner-border text-danger" role="status"></div>
  </div>

  <div class="page" id="pg-home">
    <div class="hero" id="heroEl" style="display:none">
      <div class="hero-bg"><img id="heroBgImg" src="" alt=""></div>
      <div class="hero-content">
        <div style="max-width:520px">
          <div class="hero-badge"><i class="bi bi-star-fill"></i> <span id="heroBadge">Featured</span></div>
          <div class="hero-meta">
            <span class="star"><i class="bi bi-star-fill"></i> <b id="heroRat"></b></span>
            <span class="dot"></span><span id="heroYr"></span>
            <span class="dot"></span><span id="heroTp" style="text-transform:uppercase"></span>
          </div>
          <h1 class="hero-title" id="heroTitle"></h1>
          <p class="hero-desc" id="heroDesc"></p>
          <div class="hero-btns">
            <button class="btn-primary-cv" id="heroWatchBtn"><i class="bi bi-play-fill"></i> <span data-k="watchNow">Watch Now</span></button>
            <button class="btn-secondary-cv" id="heroInfoBtn"><i class="bi bi-info-circle"></i> <span data-k="details">Details</span></button>
          </div>
        </div>
      </div>
    </div>

    <div style="max-width:1280px;margin:0 auto;padding:1.5rem 1.5rem 0">
      <div class="filter-bar" id="filterBar">
        <button class="filter-pill active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-pill" data-filter="movie" onclick="setFilter('movie',this)">Movies</button>
        <button class="filter-pill" data-filter="series" onclick="setFilter('series',this)">Series</button>
        <div style="width:1px;height:24px;background:var(--border);margin:0 .25rem"></div>
        <div id="genreFilters" style="display:flex;flex-wrap:wrap;gap:.4rem"></div>
      </div>
    </div>

    <div id="homeContent" style="max-width:1280px;margin:0 auto;padding:0 1.5rem">
      <div class="section" id="dubbedSection" style="display:none">
        <div class="section-hdr"><div class="section-title"><span class="section-bar blue"></span> <span data-k="latestDubbed">Latest Dubbed</span></div></div>
        <div class="film-grid" id="dubbedGrid"></div>
      </div>
      <div class="section" id="subbedSection" style="display:none">
        <div class="section-hdr"><div class="section-title"><span class="section-bar gold"></span> <span data-k="latestSubbed">Latest Subbed</span></div></div>
        <div class="film-grid" id="subbedGrid"></div>
      </div>
      <div class="section" id="moviesSection" style="display:none">
        <div class="section-hdr"><div class="section-title"><span class="section-bar red"></span> <span data-k="latestMovies">Latest Movies</span></div></div>
        <div class="film-grid" id="moviesGrid"></div>
      </div>
      <div class="section" id="seriesSection" style="display:none">
        <div class="section-hdr"><div class="section-title"><span class="section-bar" style="background:var(--purple)"></span> <span data-k="latestSeries">Latest Series</span></div></div>
        <div class="film-grid" id="seriesGrid"></div>
      </div>
    </div>
  </div>

  <div class="page" id="pg-film">
    <div style="max-width:1000px;margin:0 auto;padding:2rem 1.5rem">
      <button class="btn-secondary-cv mb-4" onclick="navigate('home')"><i class="bi bi-arrow-left"></i> <span data-k="back">Back</span></button>
      <div class="d-flex flex-column flex-md-row gap-4">
        <img id="detailPosterImg" style="width:200px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.5);object-fit:cover">
        <div>
          <span id="detailTypeBadge" class="fc-type mb-2"></span>
          <h1 style="font-family:var(--display);font-size:3rem;text-transform:uppercase" id="detailTitle"></h1>
          <p style="color:var(--muted)" id="detailDesc"></p>
          <button class="btn-primary-cv mt-3" id="detailWatchBtn"><i class="bi bi-play-fill"></i> <span data-k="watchNow">Watch Now</span></button>
        </div>
      </div>
      <div id="epsSection" class="mt-5" style="display:none">
        <h4 class="cv-label" data-k="episodes">Episodes</h4>
        <div class="row g-2" id="epsGrid"></div>
      </div>
    </div>
  </div>

  <div class="page" id="pg-watch">
    <div style="max-width:1200px;margin:0 auto;padding:1.5rem">
      <button class="btn-secondary-cv mb-3" id="watchBackBtn"><i class="bi bi-arrow-left"></i> <span data-k="back">Back</span></button>
      <h2 style="font-family:var(--display);text-transform:uppercase;margin-bottom:1rem" id="watchTitle"></h2>
      <div class="d-flex gap-2 mb-2" id="serverTabsEl"></div>
      <div class="player-wrap mb-4" id="playerEl"></div>
    </div>
  </div>

  <div class="page" id="pg-profile">
    <div style="max-width:560px;margin:0 auto;padding:3rem 1.5rem;text-align:center">
      <img id="profPhoto" style="width:100px;height:100px;border-radius:50%;object-fit:cover;margin:0 auto 1rem;border:3px solid var(--red)">
      <h2 style="font-family:var(--display);font-size:2rem" id="profName"></h2>
      <p style="color:var(--muted);margin-bottom:2rem" id="profEmail"></p>
      <div class="d-flex flex-column gap-3">
        <button class="btn-primary-cv justify-content-center" onclick="editProfile()"><i class="bi bi-pencil"></i> <span data-k="editProfile">Edit Profile</span></button>
        <button class="btn-secondary-cv justify-content-center" onclick="signOut()"><i class="bi bi-box-arrow-right"></i> <span data-k="signOut">Sign Out</span></button>
      </div>
    </div>
  </div>

  <div class="page" id="pg-manage">
    <div style="max-width:1280px;margin:0 auto;padding:2rem 1.5rem">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 style="font-family:var(--display);font-size:2.2rem;text-transform:uppercase" data-k="contentMgmt">Content Mgmt</h1>
        <button class="btn-primary-cv" onclick="openModal(null)"><i class="bi bi-plus-lg"></i> Add New</button>
      </div>
      <div class="row g-3" id="manageGrid"></div>
    </div>
  </div>
</main>

<div class="modal-backdrop-cv" id="filmModal">
  <div class="modal-box">
    <div class="d-flex justify-content-between mb-3">
      <h2 class="modal-title" id="modalHeading">Add Film</h2>
      <button onclick="closeModal()" class="btn-icon"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="row g-3">
      <div class="col-12">
        <label class="cv-label">Type</label>
        <select class="cv-select" id="fType" onchange="document.getElementById('videoUrlSection').style.display=this.value==='movie'?'':'none'; document.getElementById('epsFormSection').style.display=this.value==='series'?'':'none'">
          <option value="movie">Movie</option>
          <option value="series">Series</option>
        </select>
      </div>
      <div class="col-12">
        <label class="cv-label">Audio / Subtitle Format</label>
        <select class="cv-select" id="fAudio">
          <option value="none">Original</option>
          <option value="dub">Dubbed (دۆبلاژکراو)</option>
          <option value="sub">Subbed (ژێرنووسکراو)</option>
        </select>
      </div>
      <div class="col-12"><input type="text" class="cv-input" id="fTitle" placeholder="Title *"></div>
      <div class="col-12"><textarea class="cv-textarea" id="fDesc" placeholder="Description *"></textarea></div>
      <div class="col-12"><input type="url" class="cv-input" id="fThumbUrl" placeholder="Thumbnail URL *"></div>
      <div class="col-12" id="videoUrlSection"><input type="url" class="cv-input" id="fVideoUrl" placeholder="Main Video URL (Drive, YouTube, etc.)"></div>
      <div id="epsFormSection" style="display:none" class="col-12">
        <button onclick="addEpisode()" class="btn-secondary-cv btn-sm"><i class="bi bi-plus"></i> Add Ep</button>
        <div id="epsFormList" class="mt-2 d-flex flex-column gap-2"></div>
      </div>
    </div>
    <div class="d-flex justify-content-end gap-2 mt-4">
      <button onclick="closeModal()" class="btn-secondary-cv" data-k="cancel">Cancel</button>
      <button onclick="saveFilm()" id="saveBtn" class="btn-primary-cv" data-k="save">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

// ** Replace with actual Firebase Config **
const FB = { apiKey:"AIzaSy...", authDomain:"demo.firebaseapp.com", projectId:"demo", storageBucket:"demo.appspot.com", messagingSenderId:"123", appId:"1:123:web:abc" };
const app = initializeApp(FB);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let user=null, prof=null, films=[], page='home', params={};
let lang = localStorage.getItem('cv_lang')||'en';
let theme = localStorage.getItem('cv_theme')||'dark';
let editingFilm=null, epList=[];

const T = {
  en: { watchNow:'Watch Now', details:'Details', back:'Back', signIn:'Sign In', signOut:'Sign Out', editProfile:'Edit Profile', latestMovies:'Latest Movies', latestSeries:'Latest Series', latestDubbed:'Latest Dubbed', latestSubbed:'Latest Subbed', cancel:'Cancel', save:'Save', episodes:'Episodes' },
  ku: { watchNow:'ئێستا ببینە', details:'وردەکاری', back:'گەڕانەوە', signIn:'داخلبوون', signOut:'چوونەدەرەوە', editProfile:'گۆڕینی پرۆفایل', latestMovies:'نوێترین فیلمەکان', latestSeries:'نوێترین زنجیرەکان', latestDubbed:'نوێترین دۆبلاژکراو', latestSubbed:'نوێترین ژێرنووسکراو', cancel:'پاشگەز', save:'پاشەکەوت', episodes:'ئێپیزۆدەکان' }
};
const t = k => T[lang][k]||k;

window.navigate = (pg, p={}) => { page=pg; params=p; document.querySelectorAll('.page').forEach(e=>e.classList.remove('active')); document.getElementById(`pg-${pg}`).classList.add('active'); window.scrollTo(0,0); renderCurrentPage(); };
window.toggleMobNav = () => document.getElementById('mobNav').classList.toggle('open');
window.openModal = id => {
  editingFilm = films.find(f=>f.id===id)||null;
  document.getElementById('fTitle').value = editingFilm?.title||'';
  document.getElementById('fDesc').value = editingFilm?.description||'';
  document.getElementById('fThumbUrl').value = editingFilm?.thumbnailUrl||'';
  document.getElementById('fType').value = editingFilm?.type||'movie';
  document.getElementById('fAudio').value = editingFilm?.audioTrack||'none';
  document.getElementById('fVideoUrl').value = editingFilm?.videoUrl||'';
  epList = [...(editingFilm?.episodes||[])];
  document.getElementById('fType').dispatchEvent(new Event('change'));
  renderEpForm();
  document.getElementById('filmModal').classList.add('open');
};
window.closeModal = () => document.getElementById('filmModal').classList.remove('open');
window.addEpisode = () => { epList.push({title:'', videoUrl:''}); renderEpForm(); };
const renderEpForm = () => { document.getElementById('epsFormList').innerHTML = epList.map((e,i)=>`<div class="d-flex gap-2"><input class="cv-input" placeholder="Ep ${i+1} Title" value="${e.title}" oninput="epList[${i}].title=this.value"><input class="cv-input" placeholder="URL" value="${e.videoUrl}" oninput="epList[${i}].videoUrl=this.value"></div>`).join(''); };

// Enhanced Google Drive Embed Engine
const embed = url => {
  if(!url) return null;
  const u = url.trim();
  const yt = u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(yt) return `https://www.youtube.com/embed/${yt[1]}?autoplay=1`;
  const gd = u.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/);
  if(gd) return `https://drive.google.com/file/d/${gd[1]}/preview`; 
  return u; // fallback
};

const renderCurrentPage = () => {
  if(page==='home') renderHome();
  if(page==='film') renderFilm();
  if(page==='watch') renderWatch();
  if(page==='profile') renderProfile();
  if(page==='manage') renderManage();
  applyLang();
};

const renderHome = () => {
  const m=films.filter(f=>f.type==='movie'), s=films.filter(f=>f.type==='series');
  const d=films.filter(f=>f.audioTrack==='dub'), sub=films.filter(f=>f.audioTrack==='sub');
  
  const draw = (id, arr) => {
    const el = document.getElementById(id); const g = document.getElementById(id.replace('Section','Grid'));
    if(arr.length) { el.style.display=''; g.innerHTML = arr.map(f=>`<div class="film-card" onclick="navigate('film',{id:'${f.id}'})"><img src="${f.thumbnailUrl}"><div class="overlay"></div><div class="body"><span class="fc-type">${f.type}</span><div class="fc-title">${f.title}</div><button class="fc-watch"><i class="bi bi-play-fill"></i> ${t('watchNow')}</button></div></div>`).join(''); }
    else el.style.display='none';
  };
  draw('dubbedSection', d); draw('subbedSection', sub); draw('moviesSection', m); draw('seriesSection', s);
  
  if(films[0]) {
    document.getElementById('heroEl').style.display='flex';
    document.getElementById('heroBgImg').src = films[0].thumbnailUrl;
    document.getElementById('heroTitle').textContent = films[0].title;
    document.getElementById('heroDesc').textContent = films[0].description;
    document.getElementById('heroWatchBtn').onclick = () => navigate('watch', {id:films[0].id});
    document.getElementById('heroInfoBtn').onclick = () => navigate('film', {id:films[0].id});
  }
};

const renderFilm = () => {
  const f = films.find(x=>x.id===params.id); if(!f) return;
  document.getElementById('detailPosterImg').src = f.thumbnailUrl;
  document.getElementById('detailTitle').textContent = f.title;
  document.getElementById('detailDesc').textContent = f.description;
  document.getElementById('detailTypeBadge').textContent = f.audioTrack==='dub'?'Dubbed':f.audioTrack==='sub'?'Subbed':f.type;
  document.getElementById('detailWatchBtn').onclick = () => navigate('watch',{id:f.id});
  
  const eps = document.getElementById('epsSection');
  if(f.type==='series' && f.episodes?.length) {
    eps.style.display='';
    document.getElementById('epsGrid').innerHTML = f.episodes.map((e,i)=>`<div class="col-12 col-md-6"><button class="btn-secondary-cv w-100 justify-content-start" onclick="navigate('watch',{id:'${f.id}',ep:${i}})">Ep ${i+1}: ${e.title}</button></div>`).join('');
  } else eps.style.display='none';
};

const renderWatch = () => {
  const f = films.find(x=>x.id===params.id); if(!f) return;
  const ep = f.type==='series'?f.episodes?.[params.ep||0]:null;
  document.getElementById('watchTitle').textContent = f.title + (ep ? ` - Ep ${(params.ep||0)+1}` : '');
  document.getElementById('watchBackBtn').onclick = () => navigate('film',{id:f.id});
  const url = embed(ep?ep.videoUrl:f.videoUrl);
  document.getElementById('playerEl').innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
};

const renderProfile = () => {
  if(!user) return navigate('home');
  document.getElementById('profPhoto').src = user.photoURL||'https://via.placeholder.com/100';
  document.getElementById('profName').textContent = user.displayName||'User';
  document.getElementById('profEmail').textContent = user.email;
};

const renderManage = () => {
  document.getElementById('manageGrid').innerHTML = films.map(f=>`<div class="col-12 col-md-4"><div class="glass p-3 rounded-3 d-flex gap-3"><img src="${f.thumbnailUrl}" style="width:60px;height:90px;object-fit:cover;border-radius:8px"><div><h6 style="margin:0">${f.title}</h6><div class="d-flex gap-2 mt-2"><button onclick="openModal('${f.id}')" class="btn-icon"><i class="bi bi-pencil"></i></button><button onclick="deleteDoc(doc(db,'films','${f.id}'))" class="btn-icon red"><i class="bi bi-trash"></i></button></div></div></div></div>`).join('');
};

window.saveFilm = async () => {
  const data = {
    title: document.getElementById('fTitle').value,
    description: document.getElementById('fDesc').value,
    thumbnailUrl: document.getElementById('fThumbUrl').value,
    type: document.getElementById('fType').value,
    audioTrack: document.getElementById('fAudio').value,
    videoUrl: document.getElementById('fVideoUrl').value,
    episodes: epList
  };
  if(editingFilm) await updateDoc(doc(db,'films',editingFilm.id), data);
  else await addDoc(collection(db,'films'), data);
  closeModal();
};

window.editProfile = async () => {
  const newName = prompt(lang==='ku'?'ناوی نوێ:':'Enter new name:', user.displayName||'');
  const newPhoto = prompt(lang==='ku'?'وێنەی نوێ (URL):':'Enter new photo URL:', user.photoURL||'');
  if(newName !== null || newPhoto !== null) {
    await updateProfile(auth.currentUser, { displayName: newName||user.displayName, photoURL: newPhoto||user.photoURL });
    await updateDoc(doc(db, 'users', user.uid), { displayName: newName||user.displayName, photoURL: newPhoto||user.photoURL });
    window.location.reload();
  }
};

window.signIn = () => signInWithPopup(auth, provider);
window.signOut = () => fbOut(auth).then(()=>navigate('home'));

window.toggleLang = () => {
  lang = lang==='en'?'ku':'en'; localStorage.setItem('cv_lang',lang);
  document.documentElement.dir = lang==='ku'?'rtl':'ltr';
  document.body.classList.toggle('rtl', lang==='ku');
  document.getElementById('langBtn').textContent = lang==='en'?'کوردی':'EN';
  applyLang(); renderCurrentPage();
};
const applyLang = () => document.querySelectorAll('[data-k]').forEach(e=>e.textContent=t(e.dataset.k));

window.toggleTheme = () => {
  theme = theme==='dark'?'light':'dark'; localStorage.setItem('cv_theme',theme);
  document.body.classList.toggle('light-mode', theme==='light');
  document.getElementById('themeIcon').className = theme==='dark'?'bi bi-moon-stars':'bi bi-brightness-high';
};

onAuthStateChanged(auth, u => {
  user = u;
  document.getElementById('userArea').innerHTML = u ? `<img src="${u.photoURL}" class="user-avatar" onclick="navigate('profile')">` : `<button class="btn-primary-cv" onclick="signIn()">${t('signIn')}</button>`;
  document.getElementById('nl-manage').style.display = u ? '' : 'none';
  if(u) setDoc(doc(db,'users',u.uid), {email:u.email, displayName:u.displayName, photoURL:u.photoURL}, {merge:true});
});

onSnapshot(collection(db, 'films'), snap => {
  films = snap.docs.map(d=>({id:d.id, ...d.data()}));
  document.getElementById('loader').style.display='none';
  renderCurrentPage();
});

// Init
if(lang==='ku') { document.documentElement.dir='rtl'; document.body.classList.add('rtl'); }
document.getElementById('langBtn').textContent = lang==='en'?'کوردی':'EN';
if(theme==='light') document.body.classList.add('light-mode');
document.getElementById('themeIcon').className = theme==='dark'?'bi bi-moon-stars':'bi bi-brightness-high';
applyLang();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

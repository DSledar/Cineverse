function clearListeners() { activeListeners.forEach(u => u()); activeListeners = []; }

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  const inner = document.getElementById('toast-inner');
  inner.textContent = msg;
  inner.className = `px-5 py-3 rounded-full text-sm font-medium shadow-xl ${type === 'error' ? 'bg-red-700 text-white' : 'bg-gray-800 border border-white/10 text-white'}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function timeAgo(ts) {
  if (!ts) return 'just now';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const secs = Math.floor((Date.now() - d) / 1000);
  if (secs < 60) return 'just now';
  if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
  return `${Math.floor(secs/86400)}d ago`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

function getGeminiKey() {
  return localStorage.getItem('gemini_key') || '';
}

function promptGeminiKey() {
  const k = prompt('Enter your Gemini API key to use AI features (it will be stored locally):');
  if (k) { localStorage.setItem('gemini_key', k.trim()); return k.trim(); }
  return null;
}

// ============================================================
// GEMINI API
// ============================================================
async function geminiAnalyze(title, description) {
  let key = getGeminiKey();
  if (!key) { key = promptGeminiKey(); if (!key) throw new Error('No API key'); }
  const prompt = `Analyze this film titled "${title}". Description: ${description}. Provide a deep thematic analysis, target audience, mood, cinematography style you'd expect, and 3 similar film recommendations. Format nicely.`;
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || 'No analysis available.';
}

async function geminiChat(message) {
  let key = getGeminiKey();
  if (!key) { key = promptGeminiKey(); if (!key) throw new Error('No API key'); }
  chatHistory.push({ role: 'user', parts: [{ text: message }] });
  const systemPrompt = 'You are CineVerse AI, a professional film critic and assistant. Help users find movies, explain plots, and provide cinematic insights. Be concise and engaging.';
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      system_instruction: { parts: [{ text: systemPrompt }] },
      contents: chatHistory
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I had trouble with that.';
  chatHistory.push({ role: 'model', parts: [{ text: reply }] });
  return reply;
}

  try {

    console.error('Sign in error:', e);
    if (e.code === 'auth/popup-blocked') {
      showToast('Popup blocked — please allow popups for this site', 'error');
    } else if (e.code === 'auth/unauthorized-domain') {
      showToast('This domain is not authorized in Firebase — add it to Auth settings', 'error');
    } else {
      showToast('Sign in failed: ' + (e.message || e.code), 'error');

  }
};

  currentUser = user;
  if (user) {
    try {
      const ref = doc(db, 'users', user.uid);
      const snap = await getDoc(ref);
      if (snap.exists()) {
        currentProfile = snap.data();
      } else {
        currentProfile = { uid: user.uid, email: user.email, displayName: user.displayName, photoURL: user.photoURL, role: 'viewer', createdAt: serverTimestamp() };

      }
    } catch(e) { console.warn('Profile fetch error:', e); }
  } else {

  // Clear listeners and fully re-render so nav + page reflect auth state
  clearListeners();
  render();
});

// ROUTER

let routeState = { page: 'home', params: {} };

function navigate(page, params = {}) {
  clearListeners();
  routeState = { page, params };
  const hash = buildHash(page, params);
  history.pushState({ page, params }, '', '#' + hash);
  render();
}

function buildHash(page, params) {
  if (page === 'home') return '/';
  if (page === 'film') return `/film/${params.id}`;
  if (page === 'watch') return `/watch/${params.id}${params.ep !== undefined ? '?ep=' + params.ep : ''}`;
  if (page === 'profile') return '/profile';
  if (page === 'manage') return '/manage';
  return '/';
}

function parseHash() {
  const raw = location.hash.replace('#', '') || '/';
  const [path, qs] = raw.split('?');
  const parts = path.split('/').filter(Boolean);
  const params = Object.fromEntries((qs || '').split('&').filter(Boolean).map(p => p.split('=')));
  if (!parts[0] || parts[0] === '') return { page: 'home', params };
  if (parts[0] === 'film') return { page: 'film', params: { id: parts[1], ...params } };
  if (parts[0] === 'watch') return { page: 'watch', params: { id: parts[1], ...params } };
  if (parts[0] === 'profile') return { page: 'profile', params };
  if (parts[0] === 'manage') return { page: 'manage', params };
  return { page: 'home', params };
}

window.addEventListener('popstate', (e) => {
  clearListeners();
  routeState = e.state || parseHash();
  render();
});

window.addEventListener('hashchange', () => {
  clearListeners();
  routeState = parseHash();
  render();
});

function rerenderCurrentPage() { render(); }

}

function renderNav() {
  const nav = document.querySelector('nav');
  if (nav) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderNavHTML();
    const newNav = tmp.querySelector('nav');
    if (newNav) { nav.replaceWith(newNav); attachNavEvents(); }
  }
}

function attachNavEvents() {
  document.querySelectorAll('.nav-click').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const page = el.dataset.page;
      const filter = el.dataset.filter || null;
      navigate(page, filter ? { filter } : {});
      const mob = document.getElementById('mobile-nav');
      if (mob) mob.style.maxHeight = '0';
    });
  });
  const mBtn = document.getElementById('mobile-menu-btn');
  if (mBtn) {
    mBtn.addEventListener('click', () => {
      const mob = document.getElementById('mobile-nav');
      const isOpen = mob.style.maxHeight !== '0px' && mob.style.maxHeight !== '';
      mob.style.maxHeight = isOpen ? '0' : '300px';
    });
  }
}

function attachHomeEvents(params) {
  const filter = params?.filter || null;
  // Use simple query without orderBy — avoids needing a Firestore composite index
  const q = query(collection(db, 'films'), limit(50));

  const unsub = onSnapshot(q, (snap) => {
    let films = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Sort client-side by createdAt descending
    films.sort((a, b) => {
      const aT = a.createdAt?.seconds || 0;
      const bT = b.createdAt?.seconds || 0;
      return bT - aT;
    });
    if (filter) films = films.filter(f => f.type === filter);

    const heroSection = document.getElementById('hero-section');
    const filmRows = document.getElementById('film-rows');
    if (!heroSection || !filmRows) return;

    if (films.length === 0) {
      heroSection.innerHTML = `<div class="flex flex-col items-center justify-center h-full space-y-6 text-center px-4">
        <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center"><span class="w-10 h-10 text-gray-600 inline-block">${I.film}</span></div>
        <div><h2 class="text-2xl font-bold">No Films Found</h2><p class="text-gray-500 mt-2 max-w-md">The database is empty. ${isModerator() ? 'Head to <strong>Manage</strong> to add content.' : 'Check back later.'}</p></div>
        ${isModerator() ? `<button onclick="navigate('manage')" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-full font-bold btn">Go to Management</button>` : ''}
      </div>`;
      filmRows.innerHTML = '';
      return;
    }

    const hero = films[0];
    heroSection.innerHTML = `
      <div class="absolute inset-0">
        <img src="${esc(hero.thumbnailUrl)}" alt="${esc(hero.title)}" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-r from-black via-black/50 to-transparent"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
      </div>
      <div class="relative h-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col justify-center gap-6">
        <div class="max-w-2xl space-y-4 fade-up">
          <div class="flex items-center gap-3">
            <span class="bg-red-600 text-white text-xs font-bold px-2 py-1 rounded uppercase tracking-widest">${esc(hero.type)}</span>
            <div class="flex items-center gap-1 text-yellow-500"><span class="w-4 h-4 inline-block">${I.star}</span><span class="text-sm font-bold">${hero.rating}</span></div>
            <span class="text-gray-400 text-sm">${hero.year}</span>
          </div>
          <h1 class="font-display text-6xl md:text-8xl tracking-wider uppercase leading-none">${esc(hero.title)}</h1>
          <p class="text-gray-300 text-lg line-clamp-3 max-w-lg">${esc(hero.description)}</p>
          <div class="flex items-center gap-4 pt-4">
            <button onclick="navigate('watch',{id:'${hero.id}'})" class="bg-white text-black hover:bg-gray-200 px-8 py-3 rounded-full font-bold flex items-center gap-2 btn">
              <span class="w-5 h-5 inline-block">${I.play}</span> Watch Now
            </button>
            <button onclick="navigate('film',{id:'${hero.id}'})" class="bg-white/10 hover:bg-white/20 text-white backdrop-blur-md px-8 py-3 rounded-full font-bold flex items-center gap-2 btn">
              <span class="w-5 h-5 inline-block">${I.info}</span> More Info
            </button>
          </div>
        </div>
      </div>`;

    filmRows.innerHTML = `
      ${renderFilmRow('Recently Added', films)}
      ${renderFilmRow('Movies', films.filter(f => f.type === 'movie'))}
      ${renderFilmRow('Series', films.filter(f => f.type === 'series'))}
    `;
  }, (e) => {
    console.error('Firestore films error:', e);
    const heroSection = document.getElementById('hero-section');
    const filmRows = document.getElementById('film-rows');
    if (heroSection) heroSection.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center px-4 space-y-3"><p class="text-red-400 font-bold">Could not load films.</p><p class="text-gray-500 text-sm">${e.message}</p></div>`;
    if (filmRows) filmRows.innerHTML = '';
  });
  activeListeners.push(unsub);
}

function attachFilmDetailEvents(params) {
  const id = params.id;
  if (!id) { navigate('home'); return; }

  let film = null, comments = [], userRating = null, isFav = false, isWatched = false, isLater = false;

  function rerender() {
    if (!film) return;
    const root = document.getElementById('film-detail-root');
    if (!root) return;
    root.innerHTML = renderFilmDetailContent(film, comments, userRating, isFav, isWatched, isLater);
    attachFilmDetailPageEvents(id, film);
  }

  const unsubFilm = onSnapshot(doc(db, 'films', id), (snap) => {
    if (!snap.exists()) { navigate('home'); return; }
    film = { id: snap.id, ...snap.data() };
    rerender();
  });
  activeListeners.push(unsubFilm);

  const qComments = query(collection(db, 'films', id, 'comments'));
  const unsubComments = onSnapshot(qComments, (snap) => {
    comments = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    rerender();
  }, (e) => { console.warn('Comments load error:', e); });
  activeListeners.push(unsubComments);

  if (currentUser) {
    const uid = currentUser.uid;
    const unsubRating = onSnapshot(doc(db, 'films', id, 'ratings', uid), (snap) => {
      userRating = snap.exists() ? snap.data().rating : null; rerender();
    }, () => {});
    const unsubFav = onSnapshot(doc(db, 'users', uid, 'favorites', id), (snap) => {
      isFav = snap.exists(); rerender();
    }, () => {});
    const unsubWatched = onSnapshot(doc(db, 'users', uid, 'watched', id), (snap) => {
      isWatched = snap.exists(); rerender();
    }, () => {});
    const unsubLater = onSnapshot(doc(db, 'users', uid, 'watchLater', id), (snap) => {
      isLater = snap.exists(); rerender();
    }, () => {});
    activeListeners.push(unsubRating, unsubFav, unsubWatched, unsubLater);
  }
}

window.postComment = async (filmId) => {
  const input = document.getElementById('comment-input');
  if (!input || !input.value.trim() || !currentUser) return;
  const text = input.value.trim();
  input.value = '';
  try {
    await addDoc(collection(db, 'films', filmId, 'comments'), {
      filmId, userId: currentUser.uid,
      userName: currentUser.displayName || 'Anonymous',
      userPhoto: currentUser.photoURL || null,
      text, createdAt: serverTimestamp()
    });
  } catch(e) { showToast('Failed to post comment', 'error'); }
};

window.deleteComment = async (filmId, commentId) => {
  try { await deleteDoc(doc(db, 'films', filmId, 'comments', commentId)); }
  catch(e) { showToast('Failed to delete', 'error'); }
};

window.rateFilm = async (filmId, rating) => {
  if (!currentUser) { signInWithGoogle(); return; }
  try {
    await setDoc(doc(db, 'films', filmId, 'ratings', currentUser.uid), {
      filmId, userId: currentUser.uid, rating, createdAt: serverTimestamp()
    });
    showToast(`Rated ${rating}/10!`);
  } catch(e) { showToast('Failed to rate', 'error'); }
};

window.toggleList = async (listType, filmId) => {
  if (!currentUser) { signInWithGoogle(); return; }
  const ref = doc(db, 'users', currentUser.uid, listType, filmId);
  try {
    const snap = await getDoc(ref);
    if (snap.exists()) { await deleteDoc(ref); showToast('Removed'); }
    else { await setDoc(ref, { filmId, createdAt: serverTimestamp() }); showToast('Added!'); }
  } catch(e) { showToast('Failed', 'error'); }
};

window.runAIAnalysis = async (title, description) => {
  const btn = document.getElementById('ai-analyze-btn');
  const result = document.getElementById('ai-analysis-result');
  if (!btn || !result) return;
  btn.disabled = true;
  btn.innerHTML = `<span class="w-4 h-4 inline-block">${I.load}</span> Analyzing...`;
  result.classList.add('hidden');
  try {
    const text = await geminiAnalyze(title, description);
    result.textContent = text;
    result.classList.remove('hidden');
    btn.classList.add('hidden');
  } catch(e) {
    showToast('AI analysis failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = `<span class="w-4 h-4 inline-block">${I.sparkle}</span> Analyze Now`;
  }
};

    const embedUrl = currentUrl.replace('watch?v=', 'embed/').replace('youtu.be/', 'www.youtube.com/embed/');
    player = `<iframe src="${esc(embedUrl)}" class="w-full h-full" allow="autoplay; encrypted-media; fullscreen" allowfullscreen style="min-height:50vh"></iframe>`;

    player = `<video src="${esc(currentUrl)}" class="w-full" controls autoplay style="max-height:80vh"></video>`;
  }

  return `
  <!-- Header -->
  <div class="fixed top-0 left-0 right-0 z-50 p-4 flex items-center justify-between bg-gradient-to-b from-black/90 to-transparent">
    <div class="flex items-center gap-4">
      <button onclick="navigate('film',{id:'${film.id}'})" class="p-2 hover:bg-white/10 rounded-full btn"><span class="w-6 h-6 inline-block">${I.back}</span></button>

    </div>

    <div class="max-w-7xl mx-auto space-y-4">

function attachProfileEvents(params) {
  if (!currentUser) return;
  let favFilms = [], watchedFilms = [], laterFilms = [];
  let activeTab = 'favorites';

  function rerender() {
    const root = document.getElementById('profile-root');
    if (!root) return;
    const list = activeTab === 'favorites' ? favFilms : activeTab === 'watched' ? watchedFilms : laterFilms;
    root.innerHTML = renderProfileContent(list, activeTab);
    document.querySelectorAll('.profile-tab').forEach(btn => {
      btn.addEventListener('click', () => { activeTab = btn.dataset.tab; rerender(); });
    });
  }

  async function fetchList(listType, setter) {
    try {
      const snap = await getDocs(collection(db, 'users', currentUser.uid, listType));
      const ids = snap.docs.map(d => d.id);
      const films = await Promise.all(ids.map(async id => {
        try { const s = await getDoc(doc(db, 'films', id)); return s.exists() ? { id: s.id, ...s.data() } : null; }
        catch { return null; }
      }));
      setter(films.filter(Boolean));
      rerender();
    } catch(e) { console.warn('Fetch list error:', e); rerender(); }
  }

  fetchList('favorites', f => { favFilms = f; });
  fetchList('watched', f => { watchedFilms = f; });
  fetchList('watchLater', f => { laterFilms = f; });
  rerender(); // Show empty state immediately while loading
}

          <div class="space-y-1">
            <label class="text-xs font-bold uppercase tracking-widest text-gray-500">Rating (0-10)</label>
            <input id="f-rating" type="number" step="0.1" min="0" max="10" value="${film.rating}" />
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold uppercase tracking-widest text-gray-500">Genres (comma separated)</label>
            <input id="f-genres" type="text" value="${esc(Array.isArray(film.genres) ? film.genres.join(', ') : film.genres)}" placeholder="Action, Drama" />
          </div>
        </div>

        <!-- Episodes (series only) -->
        <div id="episodes-section" style="display:${film.type==='series'?'block':'none'}">
          <div class="border-t border-white/10 pt-5">
            <div class="flex items-center justify-between mb-4">
              <h3 class="font-bold text-lg">Episodes</h3>
              <button onclick="addEpisodeField()" class="text-sm text-red-500 hover:text-red-400 flex items-center gap-1 btn">
                <span class="w-4 h-4 inline-block">${I.plus}</span> Add Episode
              </button>
            </div>
            <div id="episodes-list" class="space-y-3">
              ${(film.episodes || []).map((ep, idx) => renderEpisodeField(ep, idx)).join('')}
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-white/10">
          <button onclick="closeFilmModal()" class="px-5 py-2 text-gray-400 hover:text-white font-bold btn">Cancel</button>
          <button onclick="saveFilm('${isEdit ? film.id : ''}')" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-full font-bold flex items-center gap-2 btn">
            <span class="w-4 h-4 inline-block">${I.check}</span> ${isEdit ? 'Update' : 'Save'}
          </button>
        </div>
      </div>
    </div>
  </div>`;
};

window.closeFilmModal = () => {
  const m = document.getElementById('film-modal');
  if (m) m.style.display = 'none';
};

window.updateTypeField = () => {
  const type = document.getElementById('f-type')?.value;
  const section = document.getElementById('episodes-section');
  if (section) section.style.display = type === 'series' ? 'block' : 'none';
};

let episodeCount = 0;
function renderEpisodeField(ep, idx) {
  return `<div id="ep-${idx}" class="grid grid-cols-12 gap-3 items-end p-4 rounded-lg bg-white/5 border border-white/5">
    <div class="col-span-4 space-y-1">
      <label class="text-xs text-gray-500 font-bold uppercase">Title</label>
      <input class="ep-title" type="text" value="${esc(ep.title || '')}" />
    </div>
    <div class="col-span-6 space-y-1">
      <label class="text-xs text-gray-500 font-bold uppercase">Video URL</label>
      <input class="ep-url" type="url" value="${esc(ep.videoUrl || '')}" />
    </div>
    <div class="col-span-2">
      <button onclick="this.closest('[id^=ep-]').remove()" class="w-full p-2 text-red-500 hover:bg-red-500/10 rounded btn"><span class="w-4 h-4 inline-block mx-auto">${I.trash}</span></button>
    </div>
  </div>`;
}

window.addEpisodeField = () => {
  const list = document.getElementById('episodes-list');
  if (!list) return;
  const idx = list.children.length;
  const div = document.createElement('div');
  div.innerHTML = renderEpisodeField({ title: '', videoUrl: '' }, idx);
  list.appendChild(div.firstChild);
};

window.saveFilm = async (editId) => {
  const get = id => document.getElementById(id)?.value?.trim() || '';
  const title = get('f-title');
  const desc = get('f-desc');
  const thumb = get('f-thumb');
  const video = get('f-video');
  const type = get('f-type');
  const year = parseInt(get('f-year')) || new Date().getFullYear();
  const rating = parseFloat(get('f-rating')) || 0;
  const genres = get('f-genres').split(',').map(g => g.trim()).filter(Boolean);

  if (!title || !desc || !thumb || !video) { showToast('Please fill all required fields', 'error'); return; }

  // Collect episodes
  const episodes = [];
  document.querySelectorAll('#episodes-list > [id^=ep-]').forEach((el, idx) => {
    const t = el.querySelector('.ep-title')?.value?.trim();
    const u = el.querySelector('.ep-url')?.value?.trim();
    if (t) episodes.push({ id: String(idx + 1), title: t, videoUrl: u || '' });
  });

  const data = { title, description: desc, thumbnailUrl: thumb, videoUrl: video, type, year, rating, genres, episodes };

  try {
    if (editId) {
      await updateDoc(doc(db, 'films', editId), { ...data, updatedAt: serverTimestamp() });
      showToast('Updated!');
    } else {
      await addDoc(collection(db, 'films'), { ...data, addedBy: currentUser.uid, createdAt: serverTimestamp() });
      showToast('Film added!');
    }
    closeFilmModal();
  } catch(e) { showToast('Failed to save: ' + e.message, 'error'); }
};

// ============================================================
// AI CHAT WIDGET
// ============================================================
window.toggleChat = () => {
  const box = document.getElementById('ai-chat-box');
  box.classList.toggle('open');
};

window.sendChat = async () => {
  const input = document.getElementById('chat-input');
  const msg = input?.value?.trim();
  if (!msg) return;
  input.value = '';

  const msgBox = document.getElementById('chat-messages');
  // Remove welcome screen if present
  if (msgBox.querySelector('.opacity-50')) msgBox.innerHTML = '';
  msgBox.innerHTML += `<div class="flex justify-end gap-2">
    <div class="max-w-xs p-3 rounded-2xl rounded-tr-none text-sm bg-red-600 text-white">${esc(msg)}</div>
    <div class="w-7 h-7 rounded-full bg-red-600 flex items-center justify-center flex-shrink-0"><span class="w-3 h-3 inline-block">${I.user}</span></div>
  </div>`;
  const loadId = 'chat-load-' + Date.now();
  msgBox.innerHTML += `<div id="${loadId}" class="flex gap-2">
    <div class="w-7 h-7 rounded-full bg-gray-800 flex items-center justify-center flex-shrink-0 pulse"><span class="w-3 h-3 inline-block">${I.sparkle}</span></div>
    <div class="p-3 rounded-2xl rounded-tl-none bg-white/5"><span class="w-4 h-4 text-red-500 inline-block">${I.load}</span></div>
  </div>`;
  msgBox.scrollTop = msgBox.scrollHeight;

  try {
    const reply = await geminiChat(msg);
    document.getElementById(loadId)?.remove();
    msgBox.innerHTML += `<div class="flex gap-2">
      <div class="w-7 h-7 rounded-full bg-gray-800 flex items-center justify-center flex-shrink-0"><span class="w-3 h-3 inline-block">${I.sparkle}</span></div>
      <div class="max-w-xs p-3 rounded-2xl rounded-tl-none text-sm bg-white/5 text-gray-200 whitespace-pre-wrap">${esc(reply)}</div>
    </div>`;
  } catch(e) {
    document.getElementById(loadId)?.remove();
    msgBox.innerHTML += `<div class="flex gap-2">
      <div class="w-7 h-7 rounded-full bg-gray-800 flex items-center justify-center flex-shrink-0"><span class="w-3 h-3 text-red-500 inline-block">${I.sparkle}</span></div>
      <div class="max-w-xs p-3 rounded-2xl rounded-tl-none text-sm bg-white/5 text-red-400">${esc(e.message || 'Something went wrong.')}</div>
    </div>`;
  }
  msgBox.scrollTop = msgBox.scrollHeight;
};

// ============================================================
// PAGE EVENT DISPATCH
// ============================================================
function attachPageEvents(page, params) {
  const handlers = {
    home: attachHomeEvents,
    film: attachFilmDetailEvents,
    watch: attachWatchEvents,
    profile: attachProfileEvents,
    manage: attachManageEvents,
  };
  handlers[page]?.(params);
}

// ============================================================
// GLOBAL EXPOSE
// ============================================================
window.navigate = navigate;
window.showToast = showToast;

// ============================================================
// INIT — module scripts are deferred, DOM is ready at this point
// ============================================================
routeState = parseHash();
render();
</script>
</body>
